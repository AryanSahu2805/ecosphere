# ── Application identity ─────────────────────────────────────
spring.application.name=ecosphere-backend

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── Database connection ───────────────────────────────────────
# Sensitive values (DB credentials, SMTP password, JWT secret) go in
# application-local.properties which is gitignored — NEVER commit secrets here.
spring.config.import=optional:application-local.properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Email (credentials in application-local.properties) ──────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.base-url=http://localhost:5173

# ── Logging ───────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
